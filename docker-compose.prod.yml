# =============================================================================
# PRODUCTION compose — dùng image từ GHCR (không build).
# Chạy trên VPS: `docker compose -f docker-compose.prod.yml pull && ... up -d`
#
# Networking — join 2 network ĐÃ CÓ SẴN trên VPS (external):
#   - `internal`: postgres + redis đang ở đây → backend/chatbot gọi postgres theo tên
#   - `proxy`:    Nginx Proxy Manager đang ở đây → route subdomain tới app theo tên container
# DATABASE_URL trong .env dùng tên container: ...@postgres:5432/...
# Image tag override qua env IMAGE_TAG (CI deploy ghi vào .env; mặc định :latest).
# =============================================================================

services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/leminhan01}/vegiflow-backend:${IMAGE_TAG:-latest}
    container_name: vegiflow-backend
    env_file: [./backend/.env]
    environment:
      - NODE_ENV=production
      # Container gọi nhau qua service name (cùng network `internal`)
      - CHATBOT_SERVICE_URL=http://chatbot:8000
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    init: true
    networks: [internal, proxy]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    image: ${IMAGE_REGISTRY:-ghcr.io/leminhan01}/vegiflow-admin:${IMAGE_TAG:-latest}
    container_name: vegiflow-admin
    env_file: [./admin/.env]
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    init: true
    depends_on:
      backend: { condition: service_healthy }
    networks: [proxy]

  chatbot:
    image: ${IMAGE_REGISTRY:-ghcr.io/leminhan01}/vegiflow-chatbot:${IMAGE_TAG:-latest}
    container_name: vegiflow-chatbot
    env_file: [./chatbot/.env]
    environment:
      - BACKEND_API_URL=http://backend:3000/api/bot
    restart: unless-stopped
    init: true
    networks: [internal, proxy]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status<500 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  landing:
    image: ${IMAGE_REGISTRY:-ghcr.io/leminhan01}/vegiflow-landing:${IMAGE_TAG:-latest}
    container_name: vegiflow-landing
    restart: unless-stopped
    networks: [proxy]

networks:
  internal:
    external: true       # đã có sẵn: postgres + redis
  proxy:
    external: true       # đã có sẵn: nginx-proxy-manager
